<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Selfies</title>
    <link th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}"
	rel="stylesheet" />
<script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"
	defer></script>
</head>

<body class="container mt-5">
    <h1 class="mb-4">Selfies</h1>

    <div th:if="${param.error}" class="alert alert-danger" role="alert">
        <span th:text="${param.error}"></span>
    </div>
    <div th:if="${param.success}" class="alert alert-success" role="alert">
        <span th:text="${param.success}"></span>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Date</th>
                    <th>Location</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="s : ${selfies}">
					<td th:text="${s.id}"></td>
					<td th:text="${#temporals.format(s.date, 'dd.MM.yyyy')}"></td>
					<td th:text="${s.location}"></td>
				</tr>
            </tbody>
        </table>
    </div>

    <h2 class="mt-5">Add Selfie</h2>
    <form action="#" th:action="@{/selfies}" th:object="${selfie}" class="mb-5" method="post" enctype="multipart/form-data">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="date" class="form-label">Date:</label>
                <input type="date" name="date" class="form-control" required th:field="*{date}">
            </div>
            <div class="col-md-6 mb-3">
                <label for="file" class="form-label">Select .jpg File:</label>
                <input type="file" name="file" id="file" class="form-control" accept=".jpg" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Upload</button>
		<button type="reset" class="btn btn-secondary">Reset</button>
    </form>
    <a href="/misc-management" class="btn btn-secondary">Back to Dashboard</a>
</body>

</html>
